# Codemagic CI/CD — iOS release pipeline for "Have You Fed the Dog?"
#
# Monorepo: the Flutter app lives in app/, so `working_directory: app` makes
# every script + the build run from there. Generated *.g.dart files are
# committed, so we do NOT run build_runner in CI.
#
# BEFORE the first build can run, you must (all gated on Apple Developer
# enrollment finishing):
#   1. In Codemagic: Teams/Personal settings -> Integrations -> App Store
#      Connect -> add your API key (.p8 + Issuer ID + Key ID) and name the
#      integration EXACTLY  haveyoufedthedog_asc  (must match the reference
#      under `integrations:` below).
#   2. In App Store Connect: create the app record with bundle id
#      com.haveyoufedthedog.app  (TestFlight upload needs the record to exist).
#
# Push notifications (APNs) are intentionally NOT wired up here yet — that's a
# separate step once enrollment clears. The app builds and runs without it.

workflows:
  ios-release:
    name: iOS Release
    instance_type: mac_mini_m2          # matches the instance shown in Codemagic
    max_build_duration: 60
    working_directory: app              # Flutter project root within the monorepo

    integrations:
      app_store_connect: haveyoufedthedog_asc   # <-- must match the integration name in Codemagic

    environment:
      flutter: stable                   # pin to a specific version if a stable bump ever breaks the build
      xcode: latest
      cocoapods: default

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      # Explicit signing: fetch existing OR create a fresh distribution cert +
      # App Store provisioning profile for the bundle id. (The earlier auto
      # `ios_signing` block only *fetched* and failed when nothing existed yet.)
      - name: Initialize keychain
        script: keychain initialize

      - name: Fetch or create signing files
        script: |
          app-store-connect fetch-signing-files "com.haveyoufedthedog.app" \
            --type IOS_APP_STORE \
            --create

      - name: Add certificates to keychain
        script: keychain add-certificates

      - name: Apply provisioning profiles to the Xcode project
        # This also writes /Users/builder/export_options.plist used by the build step.
        script: xcode-project use-profiles

      - name: Build signed IPA
        # Build name/number come from pubspec.yaml (currently 0.4.3+2006).
        script: flutter build ipa --release --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        # beta_groups:            # uncomment + name a TestFlight group to auto-add testers
        #   - Internal Testers
