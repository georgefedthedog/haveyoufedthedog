# haveyoufedthedog.com - static landing page.
# Reference copy; the live file is /etc/nginx/sites-available/haveyoufedthedog.com
# on dogbox-1 (symlinked into sites-enabled).
#
# TLS is Let's Encrypt via Certbot, same as api.haveyoufedthedog.com. This
# file is the PRE-certbot version: install it, then run
#
#   sudo certbot --nginx -d haveyoufedthedog.com -d www.haveyoufedthedog.com
#
# and certbot rewrites the live copy in place (adds the 443 server, cert
# paths, and the HTTP→HTTPS redirect - the "managed by Certbot" lines you
# see in the api block). DNS must already point at the box when certbot
# runs. If the HTTP-01 challenge fails behind Cloudflare's proxy, set the
# two DNS records to "DNS only" (grey cloud), run certbot, then re-enable
# the proxy.

server {
    listen 80;
    listen [::]:80;
    server_name haveyoufedthedog.com www.haveyoufedthedog.com;

    root /var/www/haveyoufedthedog;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }
}
