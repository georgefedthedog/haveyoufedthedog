# haveyoufedthedog.com — static landing page.
# Reference copy of the LIVE config; the real file is
# /etc/nginx/sites-available/haveyoufedthedog.com on dogbox-1 (symlinked into
# sites-enabled). Mirrors the post-Certbot layout - keep them in sync by hand.
#
# Two server blocks, both from Certbot's --nginx run (Let's Encrypt TLS, same
# as api.haveyoufedthedog.com):
#   1. listen 443 ssl  - the real site. Serves the files; all our edits
#      (try_files, error_page, the .well-known rule) live here.
#   2. listen 80       - redirect only. Bounces http:// to https:// and serves
#      no content. Don't delete it, or plain-http visitors get a dead connection
#      instead of being upgraded to HTTPS.
#
# From scratch on a new box: install a plain listen-80 block first, point DNS at
# the box, then run
#   sudo certbot --nginx -d haveyoufedthedog.com -d www.haveyoufedthedog.com
# and Certbot rewrites it into the two blocks below. If the HTTP-01 challenge
# fails behind Cloudflare's proxy, set the two DNS records to "DNS only" (grey
# cloud), run certbot, then re-enable the proxy.

server {
    server_name haveyoufedthedog.com www.haveyoufedthedog.com;

    root /var/www/haveyoufedthedog;
    index index.html;

    # Pretty URLs: /join -> join.html, /claim -> claim.html, /privacy ->
    # privacy.html. The app's deep links arrive as /join?code=… and /claim?…,
    # so those paths must resolve to a page for the not-installed fallback.
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # Sad dog 404 instead of nginx's default.
    error_page 404 /404.html;

    # Apple's universal-links association file has no extension; serve it as
    # JSON. (assetlinks.json already gets application/json from mime.types.)
    # Both must be reachable at https://haveyoufedthedog.com/.well-known/… with
    # no redirect for App Links / Universal Links verification to succeed.
    location = /.well-known/apple-app-site-association {
        default_type application/json;
    }

    listen 443 ssl; # managed by Certbot
    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/haveyoufedthedog.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/haveyoufedthedog.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}


server {
    if ($host = www.haveyoufedthedog.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = haveyoufedthedog.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name haveyoufedthedog.com www.haveyoufedthedog.com;
    return 404; # managed by Certbot
}
