name: haveyoufedthedog
description: "Have you fed the dog yet?"
publish_to: 'none'
version: 0.20.1+52

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^14.8.1
  package_info_plus: ^8.0.2
  pocketbase: ^0.22.0
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.3
  nfc_manager: ^3.5.0
  google_fonts: ^6.2.1
  confetti: ^0.8.0
  share_plus: ^10.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.4

flutter:
  uses-material-design: true
  assets:
    - assets/households/paihia/
    - assets/households/terrace/
    - assets/subjects/dog/
    - assets/subjects/cat/
    - assets/subjects/plant/
    - assets/subjects/bin/
    - assets/subjects/fish/
    - assets/subjects/generic/
    - assets/avatars/
