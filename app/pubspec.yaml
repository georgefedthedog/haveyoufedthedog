name: haveyoufedthedog
description: "Have You Fed the Dog?"
publish_to: "none"
version: 0.4.3+2007

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^14.8.1
  package_info_plus: ^8.0.2
  pocketbase: ^0.22.0
  cached_network_image: ^3.4.1
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.3
  nfc_manager: ^3.5.0
  google_fonts: ^6.2.1
  confetti: ^0.8.0
  share_plus: ^10.1.0
  flutter_timezone: ^4.1.0
  in_app_purchase: ^3.2.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.4
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.4

# Native (pre-Flutter) splash so the boot flash matches the brand.
# Regenerate with: dart run flutter_native_splash:create
flutter_native_splash:
  color: "#FAF3E8"
  color_dark: "#1A1620"
  image: assets/general/logo.png
  android_12:
    # Android 12+ force-masks splash art into a circle - supplying custom
    # art looks "trapped". With no image the OS uses the adaptive launcher
    # icon, which is designed for that mask.
    color: "#FAF3E8"
    color_dark: "#1A1620"

# Launcher icon. Regenerate with: dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/general/app_icon.png
  adaptive_icon_background: "#E8E4FF"
  adaptive_icon_foreground: assets/general/app_icon_transparent.png

flutter:
  uses-material-design: true
  assets:
    - assets/households/terrace/
    - assets/subjects/dog/
    - assets/subjects/cat/
    - assets/subjects/plant/
    - assets/subjects/bin/
    - assets/subjects/fish/
    - assets/subjects/generic/
    - assets/avatars/
    - assets/awards/
    - assets/general/
